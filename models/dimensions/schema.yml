version: 2

models:

  #######################################################################
  # Enterprise Movie Dimension
  #######################################################################

  - name: dim_movies
    description: "Enterprise movie dimension."

    config:
      contract:
        enforced: false

      tags:
        - dimension
        - analytics
        - movies

      meta:
        owner: "Harsh Soni"
        team: "Analytics Engineering"
        domain: "Movie Analytics"
        source_system: "MovieLens"
        criticality: "High"

    columns:

      - name: movie_sk
        description: "Surrogate key generated using dbt_utils."
        tests:
          - unique
          - not_null

      - name: movie_id
        description: "Natural business key."
        tests:
          - unique
          - not_null

      - name: title
        description: "Movie title."
        tests:
          - not_null

      - name: genres
        description: "Movie genres."

      - name: release_year
        description: "Movie release year."

      - name: record_created_at
        description: "Timestamp when dimension row was created."
        tests:
          - not_null

      - name: record_updated_at
        description: "Timestamp when dimension row was refreshed."
        tests:
          - not_null

      - name: source_system
        description: "Source system name."
        tests:
          - not_null

  #######################################################################
  # Enterprise User Dimension
  #######################################################################

  - name: dim_users
    description: "Enterprise user dimension."

    config:
      contract:
        enforced: false

      tags:
        - dimension
        - analytics
        - users

      meta:
        owner: "Harsh Soni"
        team: "Analytics Engineering"
        domain: "Movie Analytics"
        source_system: "MovieLens"
        criticality: "High"

    columns:

      - name: user_sk
        description: "Surrogate key."
        tests:
          - unique
          - not_null

      - name: user_id
        description: "Natural business key."
        tests:
          - unique
          - not_null

      - name: total_ratings
        description: "Total ratings given by the user."
        tests:
          - not_null

      - name: average_rating_given
        description: "Average rating given by the user."

      - name: minimum_rating_given
        description: "Minimum rating given by the user."

      - name: maximum_rating_given
        description: "Maximum rating given by the user."

      - name: total_tags
        description: "Total tags created by the user."

      - name: last_active
        description: "Most recent activity timestamp."

      - name: active_days
        description: "Number of active days."

      - name: favorite_genre
        description: "Favorite genre inferred from ratings."

      - name: record_created_at
        description: "Dimension creation timestamp."
        tests:
          - not_null

      - name: record_updated_at
        description: "Dimension refresh timestamp."
        tests:
          - not_null

      - name: source_system
        description: "Source system."
        tests:
          - not_null