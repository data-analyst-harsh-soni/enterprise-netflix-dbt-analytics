version: 2

models:

  #######################################################################
  # Enterprise Movie Dimension
  #######################################################################

  - name: dim_movies
    description: "Enterprise movie dimension."

    config:
      contract:
        enforced: false
      tags:
        - dimension
        - analytics
        - movies
      meta:
        owner: "Harsh Soni"
        team: "Analytics Engineering"
        domain: "Movie Analytics"
        source_system: "MovieLens"
        criticality: "High"

    columns:
      - name: movie_sk
        description: "Surrogate key."
        tests:
          - unique
          - not_null

      - name: movie_id
        description: "Natural business key."
        tests:
          - unique
          - not_null

      - name: title
        description: "Movie title."
        tests:
          - not_null

      - name: genres
        description: "Movie genres."

      - name: release_year
        description: "Movie release year."

      - name: record_created_at
        description: "Record creation timestamp."
        tests:
          - not_null

      - name: record_updated_at
        description: "Record refresh timestamp."
        tests:
          - not_null

      - name: source_system
        description: "Source system."
        tests:
          - not_null

  #######################################################################
