      - name: user_id
        description: "Natural business key."
        tests:
          - unique
          - not_null

      - name: total_ratings
        description: "Total ratings."
        tests:
          - not_null

      - name: average_rating_given
        description: "Average rating."

      - name: minimum_rating_given
        description: "Minimum rating."

      - name: maximum_rating_given
        description: "Maximum rating."

      - name: total_tags
        description: "Total tags."

      - name: last_active
        description: "Last activity."

      - name: active_days
        description: "Number of active days."

      - name: favorite_genre
        description: "Favorite genre."

      - name: record_created_at
        description: "Record creation timestamp."
        tests:
          - not_null

      - name: record_updated_at
        description: "Record refresh timestamp."
        tests:
          - not_null

      - name: source_system
        description: "Source system."
        tests:
          - not_null

