version: 2

models:

  #######################################################################
  # Executive Dashboard Mart
  #######################################################################

  - name: mart_executive_dashboard
    description: "Enterprise executive dashboard containing overall business KPIs."

    config:
      contract:
        enforced: false

      tags:
        - mart
        - business
        - executive

      meta:
        owner: "Harsh Soni"
        team: "Analytics Engineering"
        consumer: "Power BI"
        refresh_frequency: "Daily"

    columns:

      - name: total_movies
        description: "Total movies."
        tests:
          - not_null

      - name: total_genres
        description: "Distinct genres."

      - name: release_years
        description: "Distinct release years."

      - name: total_users
        description: "Total users."
        tests:
          - not_null

      - name: total_ratings
        description: "Total ratings."
        tests:
          - not_null

      - name: average_rating
        description: "Average movie rating."

      - name: minimum_rating
        description: "Minimum rating."

      - name: maximum_rating
        description: "Maximum rating."

      - name: total_genome_tags
        description: "Genome tag count."

      - name: average_relevance_score
        description: "Average genome relevance."

      - name: record_created_at
        description: "Record creation timestamp."
        tests:
          - not_null

      - name: record_updated_at
        description: "Record refresh timestamp."
        tests:
          - not_null

      - name: source_system
        description: "Source system."
        tests:
          - not_null

